services:
  postgres:
    image: postgres:16-alpine
    container_name: amldock-postgres
    environment:
      POSTGRES_DB: amldock
      POSTGRES_USER: amldock
      POSTGRES_PASSWORD: amldock
    ports:
      - "5432:5432"
    volumes:
      - amldock_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amldock -d amldock"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  amldock_pgdata:
